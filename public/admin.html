<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logger Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" />
  <link rel="stylesheet" href="/admin.css" />
</head>
<body>

  <div id="login-overlay">
    <form id="login-form" class="login-box">
      <h2>Logger Admin</h2>
      <p class="login-sub">Sign in with a service credential</p>
      <label>user id<input id="login-userid" type="text" autocomplete="username" /></label>
      <label>secret<input id="login-secret" type="password" autocomplete="current-password" /></label>
      <div id="login-error"></div>
      <button type="submit">sign in</button>
    </form>
  </div>

  <div id="app" hidden>
    <header>
      <h1>Logger Admin</h1>
      <div class="header-actions">
        <span id="logged-as"></span>
        <button id="logout-btn">sign out</button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="logs">logs</button>
      <button class="tab" data-tab="errors">errors</button>
      <button class="tab" data-tab="services">services</button>
      <button class="tab" data-tab="tokens">tokens</button>
      <button class="tab" data-tab="docs">docs</button>
    </nav>

    <div id="tab-logs" class="tab-panel">
      <div class="filters">
        <label>service
          <select id="logs-service"><option value="">all</option></select>
        </label>
        <label>from
          <input type="datetime-local" id="logs-from" />
        </label>
        <label>to
          <input type="datetime-local" id="logs-to" />
        </label>
        <label>per page
          <select id="logs-limit">
            <option>25</option>
            <option selected>50</option>
            <option>100</option>
            <option>250</option>
          </select>
        </label>
        <div class="filter-actions">
          <div class="presets">
            <button class="preset" data-hours="1">1h</button>
            <button class="preset" data-hours="24">24h</button>
            <button class="preset" data-hours="168">7d</button>
            <button class="preset" data-clear>all</button>
          </div>
          <button id="logs-apply">apply</button>
          <button id="logs-refresh">refresh</button>
          <label class="autorefresh-label">
            <input type="checkbox" id="logs-autorefresh" /> auto
            <select id="logs-autorefresh-interval">
              <option value="5">5s</option>
              <option value="15" selected>15s</option>
              <option value="30">30s</option>
              <option value="60">1m</option>
            </select>
          </label>
        </div>
      </div>
      <div class="summary" id="logs-summary"></div>
      <table>
        <thead><tr><th>timestamp</th><th>service</th><th>data</th></tr></thead>
        <tbody id="logs-rows"></tbody>
      </table>
      <div class="pager">
        <button id="logs-prev">&laquo; prev</button>
        <span id="logs-page"></span>
        <button id="logs-next">next &raquo;</button>
      </div>
    </div>

    <div id="tab-errors" class="tab-panel" hidden>
      <div class="filters">
        <label>service
          <select id="errors-service"><option value="">all</option></select>
        </label>
        <label>from
          <input type="datetime-local" id="errors-from" />
        </label>
        <label>to
          <input type="datetime-local" id="errors-to" />
        </label>
        <label>per page
          <select id="errors-limit">
            <option>25</option>
            <option selected>50</option>
            <option>100</option>
            <option>250</option>
          </select>
        </label>
        <div class="filter-actions">
          <div class="presets">
            <button class="preset" data-hours="1">1h</button>
            <button class="preset" data-hours="24">24h</button>
            <button class="preset" data-hours="168">7d</button>
            <button class="preset" data-clear>all</button>
          </div>
          <button id="errors-apply">apply</button>
          <button id="errors-refresh">refresh</button>
          <label class="autorefresh-label">
            <input type="checkbox" id="errors-autorefresh" /> auto
            <select id="errors-autorefresh-interval">
              <option value="5">5s</option>
              <option value="15" selected>15s</option>
              <option value="30">30s</option>
              <option value="60">1m</option>
            </select>
          </label>
        </div>
      </div>
      <div class="summary" id="errors-summary"></div>
      <table>
        <thead><tr><th>timestamp</th><th>service</th><th>data</th></tr></thead>
        <tbody id="errors-rows"></tbody>
      </table>
      <div class="pager">
        <button id="errors-prev">&laquo; prev</button>
        <span id="errors-page"></span>
        <button id="errors-next">next &raquo;</button>
      </div>
    </div>

    <div id="tab-services" class="tab-panel" hidden>
      <div class="summary" id="services-summary"></div>
      <div id="services-grid"></div>
    </div>

    <div id="tab-tokens" class="tab-panel" hidden>
      <div class="filters">
        <label>user id<input id="token-userid" type="text" autocomplete="username" /></label>
        <label>secret<input id="token-secret" type="password" autocomplete="current-password" /></label>
        <div class="filter-actions">
          <button id="token-get">get JWT</button>
        </div>
      </div>
      <div id="token-error" class="error" style="display:none"></div>
      <textarea id="token-output" readonly rows="4" placeholder="JWT will appear here…" style="width:100%;margin-top:1rem;font-family:monospace;font-size:0.85rem;resize:vertical"></textarea>

      <h3 style="margin-top:2rem">decode token</h3>
      <div class="filters">
        <label style="flex:1">token<textarea id="token-decode-input" rows="3" placeholder="Paste a JWT here…" style="width:100%;font-family:monospace;font-size:0.85rem;resize:vertical"></textarea></label>
        <div class="filter-actions">
          <button id="token-decode-btn">decode</button>
        </div>
      </div>
      <div id="token-decode-error" class="error" style="display:none"></div>
      <textarea id="token-decode-output" readonly rows="6" placeholder="Decoded payload will appear here…" style="width:100%;margin-top:1rem;font-family:monospace;font-size:0.85rem;resize:vertical"></textarea>
    </div>

    <div id="tab-docs" class="tab-panel" hidden style="padding:0">
      <iframe src="/docs" style="width:100%;height:calc(100vh - 120px);border:none;display:block"></iframe>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
  <script src="/admin.js"></script>
</body>
</html>
