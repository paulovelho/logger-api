<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logger Admin</title>
  <link rel="stylesheet" href="/admin.css" />
</head>
<body>
  <h1>Logger Admin — all services</h1>

  <div class="filters">
    <label>service
      <select id="userId"><option value="">all</option></select>
    </label>
    <label>from
      <input type="datetime-local" id="from" />
    </label>
    <label>to
      <input type="datetime-local" id="to" />
    </label>
    <label>per page
      <select id="limit">
        <option>25</option>
        <option selected>50</option>
        <option>100</option>
        <option>250</option>
      </select>
    </label>
    <button id="apply">apply</button>
    <button id="refresh">refresh</button>
  </div>

  <div class="summary" id="summary"></div>

  <table>
    <thead>
      <tr><th>timestamp</th><th>service</th><th>data</th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <div class="pager">
    <button id="prev">&laquo; prev</button>
    <span id="page"></span>
    <button id="next">next &raquo;</button>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
